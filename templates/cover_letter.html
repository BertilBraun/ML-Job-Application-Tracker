<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    @page { size: A4; margin: 20mm 23mm 23mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: #172033;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10.5pt;
      line-height: 1.42;
    }
    .sender {
      border-bottom: 0.5pt solid #c8ced8;
      padding-bottom: 7px;
      margin-bottom: 22px;
    }
    .sender-name { font-size: 11.5pt; font-weight: 700; margin-bottom: 2px; }
    .sender-meta { color: #485266; font-size: 8.8pt; }
    .sender-meta .site { white-space: nowrap; }
    .sender-meta svg {
      width: 10px; height: 10px; vertical-align: -1.5px; margin-right: 3px;
      stroke: #485266; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round;
    }
    .recipient { margin-bottom: 18px; color: #30384a; }
    .date { margin-bottom: 19px; color: #30384a; text-align: right; }
    .subject { font-size: 10.8pt; font-weight: 700; margin-bottom: 15px; }
    p { margin: 0 0 10px; }
  </style>
</head>
<body>
  <section class="sender">
    <div class="sender-name">Bertil Braun</div>
    <div class="sender-meta">hi@bertil-braun.de | +49 1525 3810140 | Karlsruhe/Stuttgart, Germany | <span class="site"><svg viewBox="0 0 64 64" fill="none"><path d="M39.93,55.72A24.86,24.86,0,1,1,56.86,32.15a37.24,37.24,0,0,1-.73,6"/><path d="M37.86,51.1A47,47,0,0,1,32,56.7"/><path d="M32,7A34.14,34.14,0,0,1,43.57,30a34.07,34.07,0,0,1,.09,4.85"/><path d="M32,7A34.09,34.09,0,0,0,20.31,32.46c0,16.2,7.28,21,11.66,24.24"/><line x1="10.37" y1="19.9" x2="53.75" y2="19.9"/><line x1="32" y1="6.99" x2="32" y2="56.7"/><line x1="11.05" y1="45.48" x2="37.04" y2="45.48"/><line x1="7.14" y1="32.46" x2="56.86" y2="31.85"/><path d="M53.57,57,58,52.56l-8-8,4.55-2.91a.38.38,0,0,0-.12-.7L39.14,37.37a.39.39,0,0,0-.46.46L42,53.41a.39.39,0,0,0,.71.13L45.57,49Z"/></svg>bertil-braun.de</span></div>
  </section>
  <section class="recipient">
    {% if company %}<div>{{ company }}</div>{% endif %}
  </section>
  <section class="date">{{ date_line }}</section>
  <section class="subject">{{ subject_prefix }} {{ title }}</section>
  <main>{{ letter_html | safe }}</main>
</body>
</html>
